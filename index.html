<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tufts SSO Prototypes</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f5f5f5; color: #1a1a1a; padding: 60px 24px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    p.sub { font-size: 14px; color: #888; margin-bottom: 48px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; max-width: 860px; }
    a.card {
      display: block;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 28px 24px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    a.card:hover { border-color: #3172AE; box-shadow: 0 2px 12px rgba(49,114,174,0.1); }
    .label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #3172AE; margin-bottom: 8px; }
    .title { font-size: 16px; font-weight: 500; margin-bottom: 6px; }
    .desc { font-size: 13px; color: #888; }
    .arrow { float: right; color: #ccc; font-size: 18px; }
  </style>
</head>
<body>
  <h1>Tufts SSO — Design Prototypes</h1>
  <p class="sub">Work in progress. Three login page concepts.</p>

  <div class="grid">
    <a class="card" href="design-1/index.html">
      <span class="arrow">→</span>
      <div class="label">Design 1</div>
      <div class="title">Concept One</div>
      <div class="desc">View prototype</div>
    </a>
    <a class="card" href="design-2/index.html">
      <span class="arrow">→</span>
      <div class="label">Design 2</div>
      <div class="title">Concept Two</div>
      <div class="desc">View prototype</div>
    </a>
    <a class="card" href="design-3/index.html">
      <span class="arrow">→</span>
      <div class="label">Design 3</div>
      <div class="title">Concept Three</div>
      <div class="desc">View prototype</div>
    </a>
  </div>
</body>
</html>

<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tufts University — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com/">
  <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="">
  <link href="./design 2_files/css2" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --blue-dark:    #002E6D;
      --blue-digital: #3172AE;
      --blue-hover:   #255E94;
      --white:        #FFFFFF;
      --page-bg:      #EEF1F6;
      --gray-border:  #D4D8DE;
      --gray-text:    #2C2C2C;
      --muted:        #6B7280;
      --error:        #B91C1C;
      --focus-ring:   rgba(49,114,174,0.4);
    }

    body {
      font-family: 'Proxima Nova', Arial, sans-serif;
      background: var(--page-bg);
      color: var(--gray-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 16px 40px;
      gap: 28px;
    }

    /* ── Logo ── */
    .logo img {
      width: 190px;
      max-width: 100%;
      display: block;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 400px;
      background: var(--white);
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06), 0 8px 28px rgba(0,0,0,0.10);
      padding: 36px 36px 28px;
    }

    /* ── Heading ── */
    .card h1 {
      font-size: 1.375rem;
      font-weight: 700;
      color: var(--blue-dark);
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }

    .card .subtitle {
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 26px;
    }

    /* ── Error banner ── */
    .error-banner {
      display: none;
      align-items: flex-start;
      gap: 9px;
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: 6px;
      padding: 11px 13px;
      margin-bottom: 18px;
      font-size: 0.85rem;
      color: var(--error);
    }

    .error-banner.visible { display: flex; }

    .error-banner svg {
      flex-shrink: 0;
      width: 15px;
      height: 15px;
      margin-top: 1px;
    }

    /* ── Form ── */
    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.83rem;
      font-weight: 600;
      color: var(--gray-text);
      margin-bottom: 5px;
    }

    .input-wrap {
      position: relative;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px 13px;
      font-family: inherit;
      font-size: 0.95rem;
      color: var(--gray-text);
      background: var(--white);
      border: 1.5px solid var(--gray-border);
      border-radius: 6px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
      appearance: none;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--blue-digital);
      box-shadow: 0 0 0 3px var(--focus-ring);
    }

    input[type="password"] { padding-right: 42px; }

    .toggle-pw {
      position: absolute;
      right: 11px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 3px;
      color: var(--muted);
      display: flex;
      align-items: center;
      line-height: 0;
    }

    .toggle-pw svg { width: 17px; height: 17px; }

    .toggle-pw:focus-visible {
      outline: 2px solid var(--blue-digital);
      outline-offset: 2px;
      border-radius: 3px;
    }

    /* ── Button ── */
    .btn-signin {
      display: block;
      width: 100%;
      padding: 11px;
      margin-top: 6px;
      font-family: inherit;
      font-size: 0.975rem;
      font-weight: 600;
      color: var(--white);
      background: #3172AE;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-signin:hover  { background: var(--blue-hover); }
    .btn-signin:active { transform: scale(0.99); }
    .btn-signin:focus-visible {
      outline: 3px solid var(--blue-digital);
      outline-offset: 2px;
    }

    /* ── Forgot ── */
    .forgot {
      display: block;
      text-align: center;
      margin-top: 14px;
      font-size: 0.855rem;
      color: var(--blue-digital);
      text-decoration: underline;
      font-weight: 500;
    }

    .forgot:hover { color: var(--blue-hover); text-decoration: underline; }
    .forgot:focus-visible {
      outline: 2px solid var(--blue-digital);
      outline-offset: 2px;
      border-radius: 3px;
    }

    /* ── Below-card help ── */
    .help-box {
      width: 100%;
      max-width: 400px;
      background: var(--white);
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06), 0 8px 28px rgba(0,0,0,0.10);
      padding: 18px 24px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .help-icon {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      background: var(--page-bg);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--blue-dark);
    }

    .help-icon svg { width: 18px; height: 18px; }

    .help-text p {
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--blue-dark);
      margin-bottom: 4px;
      letter-spacing: 0.01em;
      
    }

    .help-text .contacts {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .help-text a {
      font-size: 0.875rem;
      color: var(--blue-digital);
      text-decoration: underline;
      font-weight: 500;
    }

    .help-text a:hover { color: var(--blue-hover); text-decoration: underline; }

    /* ── Small footer links ── */
    .footer-links {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .footer-links a {
      font-size: 0.8rem;
      color: var(--blue-digital);
      text-decoration: underline;
    }

    .footer-links a:hover { color: var(--blue-dark); text-decoration: underline; }

    .footer-links .sep {
      font-size: 0.73rem;
      color: var(--gray-border);
    }

    /* ── Responsive ── */
    @media (max-width: 460px) {
      body { padding: 32px 14px; gap: 22px; }

      .card { padding: 26px 22px 22px; }

      .logo img { width: 160px; }
    }
  </style>
</head>

      </div>

      <div class="form-group">
        <label for="password">Tufts Password</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password" autocomplete="current-password" required="">
          <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Show password">
            <svg id="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>
            </svg>
            <svg id="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"></path>
              <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"></path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-signin">Sign In</button>
    </form>

      <a href="#" class="forgot">Forgot your Tufts username or password?</a>
  </div>

  <div class="help-box">
    <div class="help-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.14 1.18 2 2 0 012.12 0h3a2 2 0 012 1.72c.13 1 .37 1.97.72 2.9a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.18-1.18a2 2 0 012.11-.45c.93.35 1.9.59 2.9.72A2 2 0 0122 14.92z"></path>
      </svg>
    </div>
    <div class="help-text">
      <p>Need help? Contact the TTS Service Desk</p>
      <div class="flex gap-4">
        <a href="tel:+16176273376" class="text-xs text-tufts-digital" style="text-decoration: underline;">
          617-627-3376
        </a>
        <a href="mailto:it@tufts.edu" class="text-xs text-tufts-digital" style="text-decoration: underline; margin-left: 12px;">
          it@tufts.edu
        </a>
      </div>
    </div>
  </div>



  <script>
    const pwInput   = document.getElementById('password');
    const toggleBtn = document.getElementById('toggle-pw');
    const iconEye   = document.getElementById('icon-eye');
    const iconOff   = document.getElementById('icon-eye-off');

    toggleBtn.addEventListener('click', () => {
      const show = pwInput.type === 'password';
      pwInput.type = show ? 'text' : 'password';
      iconEye.style.display = show ? 'none' : '';
      iconOff.style.display = show ? ''     : 'none';
      toggleBtn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
    });

    document.getElementById('login-form').addEventListener('submit', function (e) {
      e.preventDefault();
      const username  = document.getElementById('username').value.trim();
      const password  = document.getElementById('password').value;
      const banner    = document.getElementById('error-banner');
      const errorText = document.getElementById('error-text');

      if (!username || !password) {
        errorText.textContent = 'Please enter both your username and password.';
        banner.classList.add('visible');
        (!username
          ? document.getElementById('username')
          : document.getElementById('password')
        ).focus();
        return;
      }

      banner.classList.remove('visible');
      // SSO authentication logic goes here
    });
  </script>



</body></html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tufts University — Error</title>
  <link rel="preconnect" href="https://fonts.googleapis.com/" />
  <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --blue-dark:    #002E6D;
      --blue-digital: #3172AE;
      --blue-hover:   #255E94;
      --white:        #FFFFFF;
      --page-bg:      #EEF1F6;
      --gray-border:  #D4D8DE;
      --gray-text:    #2C2C2C;
      --muted:        #6B7280;
    }

    body {
      font-family: 'Inter', 'Proxima Nova', Arial, sans-serif;
      background: var(--page-bg);
      color: var(--gray-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 20px 40px;
      gap: 28px;
    }

    /* ── Logo ── */
    .logo img {
      width: 190px;
      max-width: 100%;
      display: block;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 400px;
      background: var(--white);
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06), 0 8px 28px rgba(0,0,0,0.10);
      padding: 36px 36px 28px;
    }

    .card h1 {
      font-size: 1.375rem;
      font-weight: 700;
      color: var(--blue-dark);
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }

    .card .subtitle {
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── Help box ── */
    .help-box {
      width: 100%;
      max-width: 400px;
      background: var(--white);
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06), 0 8px 28px rgba(0,0,0,0.10);
      padding: 18px 24px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .help-icon {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      background: var(--page-bg);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--blue-dark);
    }

    .help-icon svg { width: 18px; height: 18px; }

    .help-text p {
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--blue-dark);
      margin-bottom: 4px;
      letter-spacing: 0.01em;
    }

    .help-text .contacts {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .help-text a {
      font-size: 0.875rem;
      color: var(--blue-digital);
      text-decoration: underline;
      font-weight: 500;
    }

    .help-text a:hover { color: var(--blue-hover); text-decoration: underline; }

    /* ── Responsive ── */
    @media (max-width: 460px) {
      body { padding: 32px 14px; gap: 22px; }
      .card { padding: 26px 22px 22px; }
      .logo img { width: 160px; }
    }
  </style>
</head>
<body>

  <div class="logo">
    <img src="../Tufts_univ_blue_small usage final.png" alt="Tufts University" />
  </div>

  <div class="card">
    <h1>Something went wrong</h1>
    <p class="subtitle">You may have used the Back button, followed an outdated link, or your session has expired. Please return to the application you were trying to access and sign in again.</p>
  </div>

  <div class="help-box">
    <div class="help-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.14 1.18 2 2 0 012.12 0h3a2 2 0 012 1.72c.13 1 .37 1.97.72 2.9a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.18-1.18a2 2 0 012.11-.45c.93.35 1.9.59 2.9.72A2 2 0 0122 14.92z" />
      </svg>
    </div>
    <div class="help-text">
      <p>Need help? Contact the TTS Service Desk</p>
      <div class="contacts">
        <a href="tel:+16176272000">617-627-2000</a>
        <a href="https://it.tufts.edu">it.tufts.edu</a>
      </div>
    </div>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <title>Web Login Service</title>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #eaecf0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 40px;
            padding: 24px 16px;
        }

        /* Logo — use CSS filter to strip black bg from PNG */
        .logo-wrap {
            margin-bottom: 24px;
            text-align: center;
        }
        .logo-wrap img {
            width: 300px;
            height: auto;
            
        }

        /* Card */
        .card {
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 2px 16px rgba(0,0,0,.09);
            padding: 36px 40px 32px;
            width: 100%;
            max-width: 420px;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e3a6e;
            margin-bottom: 4px;
        }

        .card-subtitle {
            font-size: 0.875rem;
            color: #5a6a80;
            margin-bottom: 24px;
        }

        /* Username display */
        .field-label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 600;
            color: #1e3a6e;
            margin-bottom: 6px;
        }

        .text-input {
            display: block;
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #d1d9e6;
            border-radius: 8px;
            font-size: 0.9375rem;
            color: #4a5568;
            background: #f5f7fb;
            outline: none;
        }
        .text-input[readonly] { cursor: default; }

        /* Not you link */
        .not-you-wrap {
            text-align: center;
            margin-top: 10px;
            margin-bottom: 24px;
        }
        .not-you-link {
            font-size: 0.875rem;
            color: #4f91cd;
            text-decoration: none;
        }
        .not-you-link:hover { text-decoration: underline; }

        /* Divider with text */
        .divider-label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            color: #8a9bb5;
            font-size: 0.8125rem;
        }
        .divider-label::before,
        .divider-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e4e8ef;
        }

        /* Buttons */
        .btn {
            display: block;
            width: 100%;
            padding: 13px 20px;
            border-radius: 8px;
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: background 0.15s, box-shadow 0.15s;
        }

        .btn-primary {
            background-color: #3b72b0;
            color: #ffffff;
            border: none;
            margin-bottom: 12px;
        }
        .btn-primary:hover { background-color: #2f5e96; box-shadow: 0 2px 8px rgba(59,114,176,.3); }

        .btn-secondary {
            background-color: #ffffff;
            color: #3b72b0;
            border: 1.5px solid #3b72b0;
        }
        .btn-secondary:hover { background-color: #f0f5fb; }

        /* Hidden Shibboleth fields */
        .hidden-fields { display: none; }

        /* Help card */
        .help-card {
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 2px 16px rgba(0,0,0,.09);
            padding: 20px 28px;
            width: 100%;
            max-width: 420px;
            margin-top: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .help-icon { color: #3b72b0; flex-shrink: 0; }

        .help-text strong {
            display: block;
            font-size: 0.875rem;
            font-weight: 700;
            color: #1e3a6e;
            margin-bottom: 5px;
        }

        .help-links { display: flex; gap: 16px; }

        .help-links a {
            font-size: 0.8125rem;
            color: #3b72b0;
            text-decoration: underline;
        }
        .help-links a:hover { color: #2f5e96; }

        @media (max-width: 480px) {
            .card { padding: 28px 20px; }
            .help-card { padding: 16px 20px; }
        }
    </style>
</head>

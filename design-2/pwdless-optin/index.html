<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Web Login Service</title>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
        <style>
            *, *::before, *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                background-color: #eaecf0;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 24px 16px;
                color: #1a1a2e;
            }

            .main {
                display: flex;
                flex-direction: column;
                align-items: center;
                width: 100%;
                max-width: 420px;
                gap: 16px;
            }

            .main-logo {
                height: 72px;
                width: auto;
                display: block;
                margin-bottom: 8px;
            }

            .card {
                background: #ffffff;
                border-radius: 14px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08), 0 0 1px rgba(0, 0, 0, 0.06);
                padding: 36px 36px 32px;
                width: 100%;
            }

            .card-title {
                font-size: 22px;
                font-weight: 700;
                color: #002E6D;
                margin-bottom: 6px;
                letter-spacing: -0.2px;
            }

            .card-subtitle {
                font-size: 14px;
                color: #5a6072;
                margin-bottom: 28px;
                line-height: 1.45;
            }

            .passkey-icon {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 52px;
                height: 52px;
                background: #eef4fb;
                border-radius: 50%;
                margin-bottom: 20px;
            }

            .passkey-icon svg {
                width: 26px;
                height: 26px;
                color: #3a78b5;
            }

            .btn-group {
                display: flex;
                flex-direction: column;
                gap: 10px;
                margin-top: 4px;
            }

            .btn {
                display: block;
                width: 100%;
                padding: 13px 20px;
                border: none;
                border-radius: 8px;
                font-size: 15px;
                font-weight: 600;
                cursor: pointer;
                transition: background 0.15s ease, box-shadow 0.15s ease;
                text-align: center;
                letter-spacing: 0.01em;
            }

            .btn-primary {
                background-color: #3a78b5;
                color: #ffffff;
            }

            .btn-primary:hover {
                background-color: #2f669e;
                box-shadow: 0 2px 6px rgba(58, 120, 181, 0.35);
            }

            .btn-primary:focus-visible {
                outline: 3px solid #4f91cd;
                outline-offset: 2px;
            }

            .btn-secondary {
                background-color: #f0f2f5;
                color: #002E6D;
            }

            .btn-secondary:hover {
                background-color: #e4e7ec;
            }

            .btn-secondary:focus-visible {
                outline: 3px solid #4f91cd;
                outline-offset: 2px;
            }

            .help-card {
                background: #ffffff;
                border-radius: 14px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08), 0 0 1px rgba(0, 0, 0, 0.06);
                padding: 16px 20px;
                width: 100%;
                display: flex;
                align-items: center;
                gap: 14px;
            }

            .help-icon {
                flex-shrink: 0;
                width: 36px;
                height: 36px;
                background: #eef4fb;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .help-icon svg {
                width: 18px;
                height: 18px;
                color: #002E6D;
            }

            .help-text {
                font-size: 13px;
                line-height: 1.5;
            }

            .help-text strong {
                display: block;
                font-size: 13px;
                font-weight: 700;
                color: #002E6D;
                margin-bottom: 2px;
            }

            .help-text a {
                color: #3a78b5;
                text-decoration: underline;
            }

            .help-text a:hover {
                text-decoration: underline;
                color: #2f669e;
            }

            .footer {
                margin-top: 8px;
                text-align: center;
            }

            .footer p {
                font-size: 12px;
                color: #8a90a0;
            }

            @media (max-width: 480px) {
                .card {
                    padding: 28px 22px 24px;
                }
            }

            @media (prefers-reduced-motion: reduce) {
                .btn { transition: none; }
            }
        </style>
    </head>
    <body>
        <main class="main">
            <header>
                <img class="main-logo" src="https://www.tufts.edu/sites/default/files/tufts-logo.svg" alt="Tufts University" />
            </header>

            <div class="card">
                <div class="passkey-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 11c0-1.1.9-2 2-2s2 .9 2 2v1"/>
                        <path d="M7 11V7a5 5 0 0 1 9.9-1"/>
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <circle cx="12" cy="16" r="1"/>
                    </svg>
                </div>

                <h1 class="card-title">Default Sign-In Method</h1>
                <p class="card-subtitle">Default to using your Passkey or device to login in the future?</p>

                <form action="#" method="post">
                    <div class="btn-group">
                        <button class="btn btn-primary" type="submit" name="optin" value="1">
                            Yes
                        </button>
                        <button class="btn btn-secondary" type="submit" name="optin" value="0">
                            No
                        </button>
                    </div>
                </form>
            </div>

            <div class="help-card" role="complementary" aria-label="Help">
                <div class="help-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
                    </svg>
                </div>
                <div class="help-text">
                    <strong>Need help? Contact the TTS Service Desk</strong>
                    <a href="tel:617-627-3376">617-627-3376</a>
                    &nbsp;&nbsp;
                    <a href="mailto:it@tufts.edu">it@tufts.edu</a>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p></p>
        </footer>
    </body>
</html>

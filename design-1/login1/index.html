<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Tufts University</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background-color: #3172AE;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px;
    }

    .logo-wrap {
      margin-bottom: 32px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.35);
      max-width: 400px;
      width: 100%;
    }

    .card-stripe { height: 6px; background: #002E6D; }

    .card-body { padding: 36px 40px; }

    h1 { font-size: 1.1rem; font-weight: 500; color: #475569; letter-spacing: 0.01em; margin-bottom: 4px; }
    .subtitle { font-size: 0.75rem; color: #94a3b8; margin-bottom: 24px; }

    .error {
      display: none;
      align-items: flex-start;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      font-size: 0.8rem;
      margin-bottom: 16px;
    }
    .error.visible { display: flex; }
    .error svg { flex-shrink: 0; margin-top: 1px; }

    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 0.875rem;
      color: #1e293b;
      background: #fff;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      font-family: inherit;
    }
    .field input::placeholder { color: #cbd5e1; }
    .field input:focus {
      border-color: #3172AE;
      box-shadow: 0 0 0 3px rgba(49,114,174,0.15);
    }

    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 40px; }
    .pw-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #94a3b8;
      padding: 0;
      display: flex;
      align-items: center;
    }
    .pw-toggle:hover { color: #475569; }

    .btn-submit {
      width: 100%;
      padding: 11px;
      background: #002E6D;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
      margin-top: 4px;
    }
    .btn-submit:hover { background: #255E94; }
    .btn-submit:active { transform: scale(0.99); }

    .forgot {
      text-align: center;
      margin-top: 16px;
    }
    .forgot a {
      font-size: 0.75rem;
      color: #3172AE;
      text-decoration: underline;
    }
    .forgot a:hover { color: #002E6D; }

    .help-card {
      margin-top: 20px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06), 0 8px 28px rgba(0,0,0,0.10);
      padding: 18px 24px;
      max-width: 400px;
      width: 100%;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .help-icon {
      flex-shrink: 0;
      width: 36px; height: 36px;
      background: #f1f5f9;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #002E6D;
    }
    .help-icon svg { width: 18px; height: 18px; }
    .help-text p {
      font-size: 0.8rem;
      font-weight: 700;
      color: #002E6D;
      margin-bottom: 4px;
      letter-spacing: 0.01em;
    }
    .help-links { display: flex; gap: 14px; flex-wrap: wrap; }
    .help-links a {
      font-size: 0.85rem;
      font-weight: 500;
      color: #3172AE;
      text-decoration: underline;
    }
    .help-links a:hover { color: #002E6D; }

    input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 40px #fff inset !important;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      15% { transform: translateX(-5px); }
      30% { transform: translateX(5px); }
      45% { transform: translateX(-4px); }
      60% { transform: translateX(4px); }
      75% { transform: translateX(-2px); }
      90% { transform: translateX(2px); }
    }
    .shake { animation: shake 0.45s ease-out; }
  </style>
</head>

  <div class="card">
    <div class="card-stripe"></div>
    <div class="card-body">
      <h1>Sign In</h1>
      <p class="subtitle">Use your Tufts credentials to continue.</p>

      <div class="error" id="error-box" role="alert">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
        </svg>
        <span id="error-msg"></span>
      </div>

      <form id="login-form" novalidate>
        <div class="field">
          <label for="username">Username</label>
          <input id="username" type="text" placeholder="e.g. jsmith01" autocomplete="username" autofocus />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <div class="pw-wrap">
            <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
            <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Show password">
              <svg id="eye-icon" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-submit">Sign In</button>
      </form>

      <div class="forgot">
        <a href="https://it.tufts.edu/password">Forgot your Tufts username or password?</a>
      </div>
    </div>
  </div>

  <div class="help-card">
    <div class="help-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.14 1.18 2 2 0 012.12 0h3a2 2 0 012 1.72c.13 1 .37 1.97.72 2.9a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.18-1.18a2 2 0 012.11-.45c.93.35 1.9.59 2.9.72A2 2 0 0122 14.92z" />
      </svg>
    </div>
    <div class="help-text">
      <p>Need help? Contact the TTS Service Desk</p>
      <div class="help-links">
        <a href="tel:+16176272000">617-627-2000</a>
        <a href="https://it.tufts.edu">it.tufts.edu</a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById("login-form");
    const errorBox = document.getElementById("error-box");
    const errorMsg = document.getElementById("error-msg");
    const pwInput = document.getElementById("password");
    const pwToggle = document.getElementById("pw-toggle");
    const eyeIcon = document.getElementById("eye-icon");

    const eyeOpen = `<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />`;
    const eyeClosed = `<path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />`;

    pwToggle.addEventListener("click", () => {
      const show = pwInput.type === "password";
      pwInput.type = show ? "text" : "password";
      eyeIcon.innerHTML = show ? eyeClosed : eyeOpen;
      pwToggle.setAttribute("aria-label", show ? "Hide password" : "Show password");
    });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorBox.classList.remove("shake");
      errorBox.classList.add("visible");
      void errorBox.offsetWidth;
      errorBox.classList.add("shake");
    }

    form.addEventListener("submit", e => {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = pwInput.value;
      if (!username) { showError("Please enter your Tufts username."); return; }
      if (!password) { showError("Please enter your password."); return; }
      errorBox.classList.remove("visible");
      form.querySelector(".btn-submit").textContent = "Signing in…";
      form.querySelector(".btn-submit").disabled = true;
    });

    document.getElementById("username").addEventListener("input", () => errorBox.classList.remove("visible"));
    pwInput.addEventListener("input", () => errorBox.classList.remove("visible"));
  </script>

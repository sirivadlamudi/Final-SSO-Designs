<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Error — Tufts University</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #3172AE;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1rem 2rem;
    }

    .logo { margin-bottom: 2rem; }
    .logo svg { fill: #ffffff; display: block; }

    .card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.35);
      width: 100%;
      max-width: 360px;
    }
    .card-stripe { height: 6px; background: #002E6D; }
    .card-body { padding: 2rem 2.5rem; }

    .error-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #94a3b8;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    .error-title {
      font-size: 1rem;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 0.75rem;
    }
    .error-msg {
      font-size: 0.8rem;
      color: #64748b;
      line-height: 1.65;
    }

    .help-card {
      margin-top: 1.25rem;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06), 0 8px 28px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 360px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 18px 24px;
    }
    .help-icon {
      width: 36px;
      height: 36px;
      min-width: 36px;
      border-radius: 8px;
      background: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #002E6D;
    }
    .help-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: #002E6D;
      margin-bottom: 4px;
      letter-spacing: 0.01em;
    }
    .help-links {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }
    .help-links a {
      font-size: 0.83rem;
      font-weight: 500;
      color: #3172AE;
      text-decoration: underline;
    }
  </style>
</head>
